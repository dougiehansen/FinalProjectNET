<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c4944a"/>
      <stop offset="100%" stop-color="#8b6434"/>
    </linearGradient>
    <linearGradient id="shineGrad" x1="0" y1="0" x2="0" y2="24" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#5a3a10" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="48" height="48" rx="12" fill="url(#bgGrad)"/>
  <!-- Shine overlay -->
  <rect width="48" height="24" rx="12" fill="url(#shineGrad)"/>

  <!-- Key group, centred -->
  <g filter="url(#shadow)" transform="translate(7, 13)">
    <!-- Key bow (ring) -->
    <circle cx="11" cy="11" r="8" stroke="white" stroke-width="3" fill="none"/>
    <!-- Inner hole of bow -->
    <circle cx="11" cy="11" r="3.5" fill="white" opacity="0.25"/>

    <!-- Key shaft -->
    <line x1="18" y1="11" x2="34" y2="11" stroke="white" stroke-width="3" stroke-linecap="round"/>

    <!-- Key teeth (two notches going down) -->
    <line x1="28" y1="11" x2="28" y2="16" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="23" y1="11" x2="23" y2="15" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  </g>
</svg>
